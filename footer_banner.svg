<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 140" width="100%" height="140" style="border-radius: 12px; overflow: hidden;">
  <defs>
    <!-- Import Google Font -->
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@600&amp;family=Outfit:wght@400;600;800&amp;display=swap');
      
      .wrapper {
        font-family: 'Outfit', -apple-system, sans-serif;
        color: #f1f5f9;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        text-align: center;
        background: transparent;
      }
      
      .typing-container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 45px;
        z-index: 10;
      }
      
      .line {
        font-family: 'Fira Code', monospace;
        font-size: 1.4rem;
        color: #06b6d4;
        font-weight: 800;
        white-space: nowrap;
        overflow: hidden;
        border-right: 3px solid #06b6d4;
        text-shadow: 0 0 15px rgba(6, 182, 212, 0.5);
        width: 0;
        height: 0;
        opacity: 0;
      }
      
      /* Typing Animation Timing for 2 cycling phrases (8s total loop) */
      .line1 {
        animation: type1 8s steps(31) infinite, blink 0.8s step-end infinite;
      }
      .line2 {
        animation: type2 8s steps(28) infinite, blink 0.8s step-end infinite;
      }
      
      @keyframes type1 {
        0% { width: 0ch; height: auto; opacity: 1; }
        12% { width: 31ch; height: auto; opacity: 1; }
        40% { width: 31ch; height: auto; opacity: 1; }
        48% { width: 0ch; height: auto; opacity: 1; }
        50%, 100% { width: 0ch; height: 0px; opacity: 0; }
      }
      
      @keyframes type2 {
        0%, 50% { width: 0ch; height: 0px; opacity: 0; }
        50.1% { width: 0ch; height: auto; opacity: 1; }
        62% { width: 28ch; height: auto; opacity: 1; }
        90% { width: 28ch; height: auto; opacity: 1; }
        98% { width: 0ch; height: auto; opacity: 1; }
        100% { width: 0ch; height: 0px; opacity: 0; }
      }
      
      @keyframes blink {
        from, to { border-color: transparent }
        50% { border-color: #06b6d4 }
      }

      /* Twinkling Stars */
      .star {
        animation: twinkle 3s infinite ease-in-out;
      }
      .star1 { animation-delay: 0s; }
      .star2 { animation-delay: 1.2s; }
      
      @keyframes twinkle {
        0%, 100% { opacity: 0.2; }
        50% { opacity: 0.8; }
      }

      /* Moving Water Ripples */
      .wave {
        animation: ripple 6s infinite linear;
      }
      
      @keyframes ripple {
        0% { transform: translateX(0px); }
        100% { transform: translateX(-40px); }
      }
    </style>
    
    <!-- Gradients -->
    <linearGradient id="sky-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <linearGradient id="mountain-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <linearGradient id="water-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#022a3a" />
      <stop offset="100%" stop-color="#01080e" />
    </linearGradient>
  </defs>

  <!-- Sky Background -->
  <rect width="800" height="140" fill="url(#sky-grad)" />

  <!-- Stars -->
  <circle class="star star1" cx="60" cy="25" r="1" fill="#ffffff" />
  <circle class="star star2" cx="180" cy="35" r="1.2" fill="#ffffff" />
  <circle class="star star1" cx="300" cy="20" r="1" fill="#ffffff" />
  <circle class="star star2" cx="520" cy="30" r="1.2" fill="#ffffff" />
  <circle class="star star1" cx="690" cy="15" r="1.5" fill="#ffffff" />
  <circle class="star star2" cx="750" cy="40" r="1" fill="#ffffff" />

  <!-- Mountains -->
  <polygon points="-40,105 60,60 160,105" fill="url(#mountain-grad)" />
  <line x1="-40" y1="105" x2="60" y2="60" stroke="#06b6d4" stroke-width="1.2" opacity="0.6" />
  <line x1="60" y1="60" x2="160" y2="105" stroke="#06b6d4" stroke-width="0.6" opacity="0.4" />
  
  <polygon points="640,105 730,55 840,105" fill="url(#mountain-grad)" />
  <line x1="640" y1="105" x2="730" y2="55" stroke="#06b6d4" stroke-width="0.6" opacity="0.4" />
  <line x1="730" y1="55" x2="840" y2="105" stroke="#06b6d4" stroke-width="1.2" opacity="0.6" />

  <!-- Water Body -->
  <rect x="0" y="100" width="800" height="40" fill="url(#water-grad)" />
  <line x1="0" y1="100" x2="800" y2="100" stroke="#06b6d4" stroke-width="1.8" opacity="0.85" />

  <!-- Ripples -->
  <g opacity="0.25">
    <path class="wave" d="M 0,115 Q 20,112 40,115 T 80,115 T 120,115 T 160,115 T 200,115 T 240,115 T 280,115 T 320,115 T 360,115 T 400,115 T 440,115 T 480,115 T 520,115 T 560,115 T 600,115 T 640,115 T 680,115 T 720,115 T 760,115 T 800,115 T 840,115" fill="none" stroke="#06b6d4" stroke-width="1" />
  </g>

  <!-- Overlay Border -->
  <rect width="798" height="138" x="1" y="1" rx="11" fill="none" stroke="rgba(255, 255, 255, 0.08)" stroke-width="2" />

  <!-- Foreground Content -->
  <foreignObject x="0" y="20" width="800" height="80">
    <div class="wrapper" xmlns="http://www.w3.org/1999/xhtml">
      <div class="typing-container">
        <div class="line line1">Thanks for visiting my profile.</div>
        <div class="line line2">Let's connect &amp; collaborate.</div>
      </div>
    </div>
  </foreignObject>
</svg>
