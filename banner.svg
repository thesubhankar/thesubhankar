<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="240" style="border-radius: 12px; overflow: hidden;">
  <defs>
    <!-- Import Google Font -->
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&amp;display=swap');
      
      .wrapper {
        font-family: 'Outfit', -apple-system, sans-serif;
        color: #f1f5f9;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        text-align: center;
        background: transparent;
      }
      
      .static-text {
        font-size: 2.2rem;
        font-weight: 800;
        margin: 0;
        color: #ffffff;
        text-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
        letter-spacing: -0.02em;
      }
      
      .typing-container {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 6px;
        height: 40px;
      }
      
      .prefix {
        font-size: 1.25rem;
        color: #94a3b8;
        font-weight: 600;
        margin-right: 6px;
      }
      
      .line {
        font-size: 1.25rem;
        color: #06b6d4;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        border-right: 2px solid #06b6d4;
        width: 0;
        height: 0;
        opacity: 0;
      }
      
      /* Typing Animation Timing for 3 cycling phrases (12s total loop) */
      .line1 {
        animation: type1 12s steps(22) infinite, blink 0.8s step-end infinite;
      }
      .line2 {
        animation: type2 12s steps(17) infinite, blink 0.8s step-end infinite;
      }
      .line3 {
        animation: type3 12s steps(13) infinite, blink 0.8s step-end infinite;
      }
      
      @keyframes type1 {
        0% { width: 0ch; height: auto; opacity: 1; }
        10% { width: 26ch; height: auto; opacity: 1; }
        25% { width: 26ch; height: auto; opacity: 1; }
        30% { width: 0ch; height: auto; opacity: 1; }
        33.3%, 100% { width: 0ch; height: 0px; opacity: 0; }
      }
      
      @keyframes type2 {
        0%, 33.3% { width: 0ch; height: 0px; opacity: 0; }
        33.4% { width: 0ch; height: auto; opacity: 1; }
        43.3% { width: 17ch; height: auto; opacity: 1; }
        58.3% { width: 17ch; height: auto; opacity: 1; }
        63.3% { width: 0ch; height: auto; opacity: 1; }
        66.6%, 100% { width: 0ch; height: 0px; opacity: 0; }
      }
      
      @keyframes type3 {
        0%, 66.6% { width: 0ch; height: 0px; opacity: 0; }
        66.7% { width: 0ch; height: auto; opacity: 1; }
        76.6% { width: 13ch; height: auto; opacity: 1; }
        91.6% { width: 13ch; height: auto; opacity: 1; }
        96.6% { width: 0ch; height: auto; opacity: 1; }
        100% { width: 0ch; height: 0px; opacity: 0; }
      }
      
      @keyframes blink {
        from, to { border-color: transparent }
        50% { border-color: #06b6d4 }
      }

      /* Twinkling Stars */
      .star {
        animation: twinkle 4s infinite ease-in-out;
      }
      .star1 { animation-delay: 0s; }
      .star2 { animation-delay: 1.5s; }
      .star3 { animation-delay: 2.8s; }
      
      @keyframes twinkle {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }

      /* Moving Water Ripples */
      .wave {
        animation: ripple 8s infinite linear;
      }
      .wave2 {
        animation: ripple 12s infinite linear reverse;
      }
      
      @keyframes ripple {
        0% { transform: translateX(0px); }
        100% { transform: translateX(-40px); }
      }
    </style>
    
    <!-- Linear Gradients -->
    <linearGradient id="sky-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="60%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>

    <linearGradient id="mountain-grad-back" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <linearGradient id="mountain-grad-front" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <linearGradient id="water-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#022a3a" />
      <stop offset="50%" stop-color="#031e29" />
      <stop offset="100%" stop-color="#01080e" />
    </linearGradient>
  </defs>

  <!-- Sky Background -->
  <rect width="800" height="240" fill="url(#sky-grad)" />

  <!-- Twinkling stars in sky -->
  <circle class="star star1" cx="80" cy="40" r="1" fill="#ffffff" />
  <circle class="star star2" cx="220" cy="65" r="1.5" fill="#ffffff" />
  <circle class="star star3" cx="340" cy="30" r="1" fill="#ffffff" />
  <circle class="star star1" cx="540" cy="50" r="1.5" fill="#ffffff" />
  <circle class="star star2" cx="680" cy="25" r="1" fill="#ffffff" />
  <circle class="star star3" cx="740" cy="70" r="1.2" fill="#ffffff" />
  
  <!-- Cyber Moon/Sun -->
  <circle cx="400" cy="110" r="45" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.35" />
  <circle cx="400" cy="110" r="40" fill="#06b6d4" opacity="0.15" />

  <!-- Background Mountain Range -->
  <polygon points="-50,170 120,90 280,170" fill="url(#mountain-grad-back)" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
  <polygon points="520,170 680,80 850,170" fill="url(#mountain-grad-back)" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
  <polygon points="200,170 400,60 600,170" fill="url(#mountain-grad-back)" stroke="rgba(255,255,255,0.05)" stroke-width="1" />

  <!-- Foreground Mountains (with neon glowing ridges) -->
  <g>
    <!-- Left Mountain -->
    <polygon points="-80,180 80,105 240,180" fill="url(#mountain-grad-front)" />
    <line x1="-80" y1="180" x2="80" y2="105" stroke="#06b6d4" stroke-width="1.5" opacity="0.8" />
    <line x1="80" y1="105" x2="240" y2="180" stroke="#06b6d4" stroke-width="0.8" opacity="0.5" />
    
    <!-- Right Mountain -->
    <polygon points="560,180 700,95 860,180" fill="url(#mountain-grad-front)" />
    <line x1="560" y1="180" x2="700" y2="95" stroke="#06b6d4" stroke-width="0.8" opacity="0.5" />
    <line x1="700" y1="95" x2="860" y2="180" stroke="#06b6d4" stroke-width="1.5" opacity="0.8" />
  </g>

  <!-- Water Body -->
  <rect x="0" y="170" width="800" height="70" fill="url(#water-grad)" />
  
  <!-- Neon Water Horizon Line -->
  <line x1="0" y1="170" x2="800" y2="170" stroke="#06b6d4" stroke-width="2" opacity="0.9" />

  <!-- Animated Water Waves (Ripples) -->
  <g opacity="0.3">
    <!-- Wave line 1 -->
    <path class="wave" d="M 0,185 Q 20,182 40,185 T 80,185 T 120,185 T 160,185 T 200,185 T 240,185 T 280,185 T 320,185 T 360,185 T 400,185 T 440,185 T 480,185 T 520,185 T 560,185 T 600,185 T 640,185 T 680,185 T 720,185 T 760,185 T 800,185 T 840,185" fill="none" stroke="#06b6d4" stroke-width="1.2" />
    <!-- Wave line 2 -->
    <path class="wave2" d="M -40,205 Q -20,202 0,205 T 40,205 T 80,205 T 120,205 T 160,205 T 200,205 T 240,205 T 280,205 T 320,205 T 360,205 T 400,205 T 440,205 T 480,205 T 520,205 T 560,205 T 600,205 T 640,205 T 680,205 T 720,205 T 760,205 T 800,205" fill="none" stroke="#06b6d4" stroke-width="1" />
    <!-- Wave line 3 -->
    <path class="wave" d="M 0,225 Q 20,222 40,225 T 80,225 T 120,225 T 160,225 T 200,225 T 240,225 T 280,225 T 320,225 T 360,225 T 400,225 T 440,225 T 480,225 T 520,225 T 560,225 T 600,225 T 640,225 T 680,225 T 720,225 T 760,225 T 800,225 T 840,225" fill="none" stroke="#06b6d4" stroke-width="1.5" />
  </g>

  <!-- Overlay Border -->
  <rect width="798" height="238" x="1" y="1" rx="11" fill="none" stroke="rgba(255, 255, 255, 0.08)" stroke-width="2" />

  <!-- Foreground Typing Text Content -->
  <foreignObject x="0" y="20" width="800" height="140">
    <div class="wrapper" xmlns="http://www.w3.org/1999/xhtml">
      <h1 class="static-text">Hi, I'm Subhankar Giri</h1>
      <div class="typing-container">
        <span class="prefix">I am a</span>
        <div class="line line1">Aspiring Data Scientist.</div>
        <div class="line line2">AI/ML Enthusiast.</div>
        <div class="line line3">Data Analyst.</div>
      </div>
    </div>
  </foreignObject>
</svg>
